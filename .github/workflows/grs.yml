name: Update README cards

on:
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Generate stats card
        uses: readme-tools/github-readme-stats-action@v1
        with:
          card: stats
          options: username=${{ github.repository_owner }}&hide_border=true&show_icons=true&count_private=true&theme=github_dark
          path: profile/stats.svg
          token: ${{ github.token }}

      - name: Generate top languages card
        uses: readme-tools/github-readme-stats-action@v1
        with:
          card: top-langs
          options: username=${{ github.repository_owner }}&hide_border=true&layout=compact&theme=github_dark
          path: profile/top-langs.svg
          token: ${{ github.token }}

      - name: Generate pin card for ESLint Noir Config
        uses: readme-tools/github-readme-stats-action@v1
        with:
          card: pin
          options: username=ardalanamini&repo=eslint-config-noir
          path: profile/pin-eslint-config-noir.svg
          token: ${{ github.token }}

      - name: Commit cards
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@users.noreply.github.com"
          git add profile/*.svg
          git commit -m "Update README cards" || exit 0
          git push
